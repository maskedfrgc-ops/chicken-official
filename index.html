<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chicken • unblocked</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #ffffff;
            --orange-light: #d9d9d9;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: #181818;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            cursor: url('./assets/comic.cur'), auto;
        }
        a, button, input, select { cursor: url('./assets/comic.cur'), pointer; }
        
        /* Blueprint Background */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
        }
        
        .background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: -1;
        }
        
        /* Floating Sidebar - Right Side */
        .sidebar {
            position: fixed;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            width: 82px;
            background: rgba(32, 32, 32, 0.68);
            backdrop-filter: blur(24px);
            border: none;
            border-radius: 20px;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            z-index: 100;
        }
        
        .sidebar-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ddd;
            border-radius: 16px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-icon-asset {
            width: 34px;
            height: 34px;
            display: block;
            flex: 0 0 auto;
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), filter 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .icon-games {
            width: 38px;
        }

        .icon-home {
            background-image: url('./assets/home.png');
        }

        .icon-games {
            background-image: url('./assets/games.png');
        }

        .icon-apps {
            background-image: url('./assets/apps.png');
        }

        .icon-chat {
            width: 46px;
            height: 46px;
            background-image: url('./assets/chat.svg');
        }

        .icon-settings {
            background-image: url('./assets/settings.png');
        }
        
        .sidebar-icon:hover {
            background: transparent;
            color: white;
        }
        
        .sidebar-icon.active {
            background: transparent;
            color: white;
        }

        .sidebar-icon:hover .sidebar-icon-asset,
        .sidebar-icon:focus-visible .sidebar-icon-asset {
            transform: scale(1.12);
            filter: brightness(0.72);
        }
        
        /* Main Content */
        .main {
            flex: 1;
            padding: 64px 112px 64px 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .title {
            font-size: 128px;
            font-weight: 700;
            letter-spacing: -7px;
            color: white;
            margin-bottom: 16px;
        }
        
        .rotating-container {
            text-align: center;
            margin-bottom: 48px;
            width: min(780px, 100%);
            display: flex;
            justify-content: center;
        }
        
        .rotating-text {
            position: relative;
            height: 42px;
            width: min(780px, 100%);
            overflow: hidden;
        }
        
        .rotating-text span {
            position: absolute;
            inset: 0;
            width: 100%;
            font-size: 26px;
            font-weight: 500;
            color: var(--orange-light);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 12px;
        }
        
        .rotating-text span.active {
            opacity: 1;
            transform: translateY(0);
        }

        .search-launcher {
            width: min(780px, 100%);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 24px;
            background: rgba(32, 32, 32, 0.68);
            backdrop-filter: blur(24px);
        }

        .search-launcher input {
            flex: 1;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.06);
            color: white;
            border-radius: 18px;
            padding: 18px 20px;
            font: inherit;
            font-size: 16px;
        }

        .search-launcher input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-launcher button {
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 18px;
            padding: 18px 24px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.25s ease, background 0.25s ease;
        }

        .search-launcher button:hover {
            background: rgba(255, 255, 255, 0.16);
            transform: scale(1.03);
        }

        .credits-bar {
            position: absolute;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
        }

        .credits-trigger {
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.52);
            font: inherit;
            font-size: 13px;
            text-decoration: underline;
            padding: 8px 10px;
        }

        .credits-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.58);
            backdrop-filter: blur(8px);
            z-index: 200;
            padding: 16px;
        }

        .credits-overlay.is-open {
            display: flex;
        }

        .credits-modal {
            width: min(540px, 100%);
            background: rgba(26, 26, 26, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 26px;
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.34);
        }

        .credits-modal-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 14px;
        }

        .credits-modal h2 {
            font-size: 28px;
            letter-spacing: -0.05em;
        }

        .credits-close {
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-radius: 14px;
            padding: 10px 12px;
            font: inherit;
            font-weight: 700;
        }

        .credits-modal p {
            color: rgba(255, 255, 255, 0.72);
            line-height: 1.8;
            font-size: 15px;
            margin-bottom: 14px;
        }

        .credits-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }

        .credits-buttons a {
            text-decoration: none;
            padding: 14px 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 14px;
        }

        .credits-buttons .direct {
            background: #ffffff;
            color: #121212;
        }

        .credits-buttons .proxy {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        @media (max-width: 900px) {
            .main {
                padding: 48px 108px 48px 24px;
            }

            .title {
                font-size: 88px;
            }

        }

        @media (max-width: 700px) {
            body {
                overflow: auto;
            }

            .sidebar {
                right: 12px;
                width: 72px;
            }

            .main {
                justify-content: flex-start;
                padding: 40px 96px 40px 20px;
            }

            .title {
                font-size: 64px;
                letter-spacing: -3px;
                text-align: center;
            }

            .rotating-text {
                height: 56px;
            }

            .rotating-text span {
                font-size: 20px;
            }

            .search-launcher {
                flex-direction: column;
                align-items: stretch;
            }

            .credits-modal {
                border-radius: 24px;
                padding: 22px;
            }

        }
        
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('educationLandingBypassOnce') === 'true') {
            localStorage.removeItem('educationLandingBypassOnce');
        } else if (localStorage.getItem('educationLandingEnabled') !== 'false') {
            window.location.replace('./education.html');
        }
    </script>
    <div class="background"></div>
    
    <!-- Floating Right Sidebar with SVG Icons -->
    <div class="sidebar">
        <a class="sidebar-icon active" href="./index.html" aria-label="Home">
            <div class="sidebar-icon-asset icon-home"></div>
        </a>

        <a class="sidebar-icon" href="./games.html" aria-label="Games">
            <div class="sidebar-icon-asset icon-games"></div>
        </a>
        
        <a class="sidebar-icon" href="./apps.html" aria-label="Apps">
            <div class="sidebar-icon-asset icon-apps"></div>
        </a>
        
        <a class="sidebar-icon" href="./chat.html" aria-label="Chat">
            <div class="sidebar-icon-asset icon-chat"></div>
        </a>
        
        <a class="sidebar-icon" href="./settings.html" aria-label="Settings">
            <div class="sidebar-icon-asset icon-settings"></div>
        </a>
    </div>
    
    <!-- Main Content -->
    <div class="main">
        <h1 class="title">chicken</h1>
        
        <div class="rotating-container">
            <div class="rotating-text" id="rotatingText"></div>
        </div>

        <form class="search-launcher" id="browserLaunchForm">
            <input id="browserLaunchInput" type="text" placeholder="Search the web or enter a URL">
            <button type="submit">open</button>
        </form>

        <div class="credits-bar">
            <button class="credits-trigger" id="creditsTrigger" type="button">credits</button>
        </div>
    </div>

    <div class="credits-overlay" id="creditsOverlay" aria-hidden="true">
        <div class="credits-modal" role="dialog" aria-modal="true" aria-labelledby="creditsTitle">
            <div class="credits-modal-top">
                <h2 id="creditsTitle">credits</h2>
                <button class="credits-close" id="creditsClose" type="button">close</button>
            </div>
            <p>Truffled for the custom cursor.</p>
            <p>GN-Math for most of the games.</p>
            <p>Bog aka aukak for help with the proxy.</p>
            <div class="credits-buttons">
                <a class="direct" href="https://github.com/aukak" target="_blank" rel="noopener noreferrer">bogs github direct</a>
                <a class="proxy" href="./search.html?url=https%3A%2F%2Fgithub.com%2Faukak">bogs github proxy</a>
            </div>
        </div>
    </div>

    <script src="./js/search.js"></script>
    <script>
        const creditsTrigger = document.getElementById('creditsTrigger');
        const creditsOverlay = document.getElementById('creditsOverlay');
        const creditsClose = document.getElementById('creditsClose');
        const messages = [
            "mogged",
            "larpchicken",
            "arcady is pretty cool",
            "uh.. ooze is pretty RADICAL...",
            "who doesnt like chicken?",
            "canes unblocked OG"
        ];
        
        let currentIndex = 0;
        const container = document.getElementById('rotatingText');
        
        messages.forEach((msg, i) => {
            const span = document.createElement('span');
            span.textContent = msg;
            if (i === 0) span.classList.add('active');
            container.appendChild(span);
        });
        
        function rotateText() {
            const spans = container.querySelectorAll('span');
            spans[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % messages.length;
            spans[currentIndex].classList.add('active');
        }
        
        setInterval(rotateText, 3200);

        const browserLaunchForm = document.getElementById('browserLaunchForm');
        const browserLaunchInput = document.getElementById('browserLaunchInput');

        browserLaunchForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const raw = browserLaunchInput.value.trim();
            if (!raw) return;
            const target = search(raw, 'https://duckduckgo.com/?q=%s');
            window.location.href = `./search.html?url=${encodeURIComponent(target)}`;
        });

        creditsTrigger.addEventListener('click', () => {
            creditsOverlay.classList.add('is-open');
            creditsOverlay.setAttribute('aria-hidden', 'false');
        });

        creditsClose.addEventListener('click', () => {
            creditsOverlay.classList.remove('is-open');
            creditsOverlay.setAttribute('aria-hidden', 'true');
        });

        creditsOverlay.addEventListener('click', (event) => {
            if (event.target === creditsOverlay) {
                creditsOverlay.classList.remove('is-open');
                creditsOverlay.setAttribute('aria-hidden', 'true');
            }
        });
    </script>
</body>
</html>
