<script>
document.getElementById('aboutblank').addEventListener('click', function() {
    const iframe = document.getElementById('gameframe');
    const currentUrl = iframe.src;
    
    if (currentUrl && currentUrl !== 'about:blank') {
        const win = window.open('about:blank');
        const doc = win.document;
        doc.open();
        doc.write('<iframe src="' + currentUrl + '" style="position:fixed;top:0;left:0;bottom:0;right:0;width:100%;height:100%;border:none;margin:0;padding:0;overflow:hidden;"></iframe>');
        doc.close();
        doc.title = 'New Tab';
    } else {
        const aboutBlankBtn = document.getElementById('aboutblank');
        const originalHTML = aboutBlankBtn.innerHTML;
        aboutBlankBtn.innerHTML = '<i class="fas fa-times"></i>';
        aboutBlankBtn.style.color = '#FF5722';
        setTimeout(() => {
            aboutBlankBtn.innerHTML = originalHTML;
            aboutBlankBtn.style.color = '';
        }, 1500);
    }
});
</script>

<script>
function getUrlParameter(name) {
    name = name.replace(/[\[\]]/g, '\\$&');
    var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
    var results = regex.exec(location.href);
    if (!results) return '';
    if (!results[2]) return '';
    return decodeURIComponent(results[2].replace(/\+/g, ' '));
}

function shouldProxyTarget(targetUrl) {
    return getUrlParameter('proxy') === '1' && /^https?:\/\//i.test(targetUrl);
}

async function loadProxyContent(targetUrl) {
    const iframe = document.getElementById('gameframe');
    if (
        typeof window.BareMux === 'undefined' ||
        typeof window.__uv$config === 'undefined' ||
        typeof window.registerSW !== 'function'
    ) {
        iframe.src = targetUrl;
        return;
    }

    try {
        await registerSW();

        const connection = new BareMux.BareMuxConnection('/baremux/worker.js');
        const wispUrl =
            (location.protocol === 'https:' ? 'wss' : 'ws') +
            '://' +
            location.host +
            '/wisp/';

        if ((await connection.getTransport()) !== '/epoxy/index.mjs') {
            await connection.setTransport('/epoxy/index.mjs', [{ wisp: wispUrl }]);
        }

        iframe.src = __uv$config.prefix + __uv$config.encodeUrl(targetUrl);
    } catch (error) {
        iframe.src = targetUrl;
    }
}

async function loadFrameContent(targetUrl) {
    const iframe = document.getElementById('gameframe');
    if (!targetUrl) {
        iframe.src = 'about:blank';
        return;
    }

    if (shouldProxyTarget(targetUrl)) {
        await loadProxyContent(targetUrl);
        return;
    }

    const isHtmlDocument =
        /^https?:\/\//i.test(targetUrl) &&
        (/\.html?([?#]|$)/i.test(targetUrl) || targetUrl.includes('cdn.jsdelivr.net/gh/gnmathcopy/html@'));

    if (!isHtmlDocument) {
        iframe.src = targetUrl;
        return;
    }

    try {
        const response = await fetch(targetUrl + (targetUrl.includes('?') ? '&' : '?') + 't=' + Date.now());
        let html = await response.text();
        const baseHref = targetUrl.slice(0, targetUrl.lastIndexOf('/') + 1);
        if (!/<base\s/i.test(html)) {
            html = html.replace(/<head([^>]*)>/i, `<head$1><base href="${baseHref}">`);
        }
        iframe.removeAttribute('src');
        iframe.contentDocument.open();
        iframe.contentDocument.write(html);
        iframe.contentDocument.close();
    } catch (error) {
        iframe.src = targetUrl;
    }
}

var url = getUrlParameter('url');
if (url) {
    loadFrameContent(url);
}
</script>
<script>
document.getElementById('fullscreen').addEventListener('click', function () {
    var iframe = document.getElementById('gameframe');
    if (iframe.requestFullscreen) {
        iframe.requestFullscreen();
    } else if (iframe.mozRequestFullScreen) {
        iframe.mozRequestFullScreen();
    } else if (iframe.webkitRequestFullscreen) {
        iframe.webkitRequestFullscreen();
    } else if (iframe.msRequestFullscreen) {
        iframe.msRequestFullscreen();
    }
});
</script>
<script>
document.getElementById('copylink').addEventListener('click', function() {
    const copyBtn = document.getElementById('copylink');
    const originalHTML = copyBtn.innerHTML;
    const iframe = document.getElementById('gameframe');
    const currentUrl = iframe.src;
    if (currentUrl && currentUrl !== 'about:blank') {
        const fullUrl = window.location.origin + window.location.pathname + '?url=' + encodeURIComponent(currentUrl);
        navigator.clipboard.writeText(fullUrl).then(() => {
            copyBtn.innerHTML = '<i class="fas fa-check"></i>';
            copyBtn.classList.add('copied');
            setTimeout(() => {
                copyBtn.innerHTML = originalHTML;
                copyBtn.classList.remove('copied');
            }, 2000);
        }).catch(() => {
            const textArea = document.createElement('textarea');
            textArea.value = fullUrl;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            copyBtn.innerHTML = '<i class="fas fa-check"></i>';
            copyBtn.classList.add('copied');
            setTimeout(() => {
                copyBtn.innerHTML = originalHTML;
                copyBtn.classList.remove('copied');
            }, 2000);
        });
    } else {
        copyBtn.innerHTML = '<i class="fas fa-times"></i>';
        copyBtn.style.color = '#FF5722';
        setTimeout(() => {
            copyBtn.innerHTML = originalHTML;
            copyBtn.style.color = '';
        }, 1500);
    }
});
</script>
