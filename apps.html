<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chicken • apps</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #181818; --panel: rgba(32, 32, 32, 0.68); --grid: rgba(255,255,255,0.04); --text: #fff; --muted: rgba(255,255,255,0.68); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; cursor: url('./assets/comic.cur'), auto; }
        a, button, input, select { cursor: url('./assets/comic.cur'), pointer; }
        .background { position: fixed; inset: 0; background: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; }
        .sidebar { position: fixed; right: 24px; top: 50%; transform: translateY(-50%); width: 82px; background: var(--panel); backdrop-filter: blur(24px); border-radius: 20px; padding: 24px 0; display: flex; flex-direction: column; align-items: center; gap: 28px; z-index: 10; }
        .sidebar-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .sidebar-icon-asset { width: 34px; height: 34px; display: block; flex: 0 0 auto; background-position: center; background-repeat: no-repeat; background-size: contain; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), filter 0.35s cubic-bezier(0.4,0,0.2,1); }
        .icon-home { background-image: url('./assets/home.png'); } .icon-games { background-image: url('./assets/games.png'); width: 38px; } .icon-apps { background-image: url('./assets/apps.png'); } .icon-chat { background-image: url('./assets/chat.svg'); width: 46px; height: 46px; } .icon-settings { background-image: url('./assets/settings.png'); }
        .sidebar-icon:hover .sidebar-icon-asset, .sidebar-icon:focus-visible .sidebar-icon-asset { transform: scale(1.12); filter: brightness(0.72); }
        .page { padding: 56px 118px 56px 40px; }
        .page h1 { font-size: 46px; font-weight: 700; letter-spacing: -2px; margin-bottom: 8px; }
        .page p, .count { color: var(--muted); }
        .page p { margin-bottom: 28px; }
        .search-wrap { width: min(560px, 100%); margin: 0 auto 26px; position: relative; }
        .search { width: 100%; margin-bottom: 24px; }
        .search input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: white; border-radius: 16px; padding: 16px 18px; font: inherit; outline: none; }
        .search-suggestions { position: absolute; top: calc(100% + 10px); left: 0; right: 0; background: var(--suggestion-bg, rgba(24,24,24,0.96)); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; backdrop-filter: blur(24px); overflow: hidden; display: none; z-index: 15; }
        .search-suggestions.show { display: block; }
        .suggestion-button { width: 100%; border: none; background: transparent; color: white; text-align: left; padding: 12px 14px; font: inherit; cursor: pointer; transition: background 0.2s ease; display: flex; align-items: center; gap: 12px; }
        .suggestion-button:hover, .suggestion-button.active { background: var(--suggestion-hover, rgba(255,255,255,0.08)); }
        .suggestion-thumb { width: 42px; height: 42px; border-radius: 12px; object-fit: cover; flex: 0 0 auto; background: rgba(255,255,255,0.06); }
        .suggestion-label { min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .count { margin-bottom: 20px; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 22px; }
        .card { position: relative; aspect-ratio: 1/1; border-radius: 22px; overflow: hidden; background: rgba(255,255,255,0.06); text-decoration: none; color: white; display: block; }
        .card img, .card video { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.28s ease, filter 0.28s ease; }
        .card::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0); transition: background 0.28s ease; }
        .card-title { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; text-align: center; padding: 16px; font-size: 22px; font-weight: 700; opacity: 0; transform: translateY(8px); transition: opacity 0.28s ease, transform 0.28s ease; z-index: 1; }
        .card:hover::after { background: rgba(0,0,0,0.42); }
        .card:hover .card-title { opacity: 1; transform: translateY(0); }
        .card:hover img, .card:hover video { transform: scale(1.04); filter: brightness(0.48); }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="sidebar">
        <a class="sidebar-icon" href="./index.html" aria-label="Home"><div class="sidebar-icon-asset icon-home"></div></a>
        <a class="sidebar-icon" href="./games.html" aria-label="Games"><div class="sidebar-icon-asset icon-games"></div></a>
        <a class="sidebar-icon" href="./apps.html" aria-label="Apps"><div class="sidebar-icon-asset icon-apps"></div></a>
        <a class="sidebar-icon" href="./chat.html" aria-label="Chat"><div class="sidebar-icon-asset icon-chat"></div></a>
        <a class="sidebar-icon" href="./settings.html" aria-label="Settings"><div class="sidebar-icon-asset icon-settings"></div></a>
    </div>
    <main class="page">
        <h1>apps</h1>
        <div class="search-wrap">
            <div class="search"><input id="searchInput" type="text" placeholder="Search apps..."></div>
            <div class="search-suggestions" id="searchSuggestions"></div>
        </div>
        <div class="count" id="countLabel">Loading apps...</div>
        <div class="grid" id="cardGrid"></div>
    </main>
    <script src="./data/catalog.js"></script>
    <script>
        const items = (window.CHICKEN_CATALOG && window.CHICKEN_CATALOG.apps) || [];
        const grid = document.getElementById('cardGrid');
        const searchInput = document.getElementById('searchInput');
        const countLabel = document.getElementById('countLabel');
        const searchSuggestions = document.getElementById('searchSuggestions');
        let activeSuggestionIndex = -1;
        let currentSuggestions = [];
        const cleanPath = (path) => (path || '').replace(/^\/+/, './');
        const getHref = (item) => `./iframe.html?url=${encodeURIComponent(item.scramjetUrl || item.url || '')}&proxy=1`;
        function render(list) {
            grid.innerHTML = '';
            list.forEach((item) => {
                const link = document.createElement('a');
                link.className = 'card';
                link.href = getHref(item);
                const img = document.createElement('img');
                img.src = cleanPath(item.thumbnail);
                img.alt = item.name;
                const title = document.createElement('div');
                title.className = 'card-title';
                title.textContent = item.name;
                link.appendChild(img);
                link.appendChild(title);
                grid.appendChild(link);
            });
            countLabel.textContent = `showing ${list.length} apps`;
        }

        function openItem(item) {
            if (!item) return;
            window.location.href = getHref(item);
        }

        function hideSuggestions() {
            searchSuggestions.classList.remove('show');
            searchSuggestions.innerHTML = '';
            currentSuggestions = [];
            activeSuggestionIndex = -1;
        }

        function showSuggestions(list) {
            if (!list.length) {
                hideSuggestions();
                return;
            }

            currentSuggestions = list;
            activeSuggestionIndex = -1;
            searchSuggestions.innerHTML = '';

            list.forEach((item) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'suggestion-button';
                const thumb = document.createElement('img');
                thumb.className = 'suggestion-thumb';
                thumb.src = cleanPath(item.thumbnail);
                thumb.alt = '';
                const label = document.createElement('span');
                label.className = 'suggestion-label';
                label.textContent = item.name;
                button.appendChild(thumb);
                button.appendChild(label);
                button.addEventListener('mousedown', (event) => {
                    event.preventDefault();
                    openItem(item);
                });
                searchSuggestions.appendChild(button);
            });

            searchSuggestions.classList.add('show');
        }

        function updateActiveSuggestion(nextIndex) {
            const buttons = Array.from(searchSuggestions.querySelectorAll('.suggestion-button'));
            buttons.forEach((button, index) => {
                button.classList.toggle('active', index === nextIndex);
            });
            activeSuggestionIndex = nextIndex;
        }

        function updateSuggestions() {
            const value = searchInput.value.trim().toLowerCase();
            if (!value) {
                hideSuggestions();
                return;
            }
            const matches = items
                .filter((item) => [item.name, ...(item.altNames || [])].join(' ').toLowerCase().includes(value))
                .slice(0, 8);
            showSuggestions(matches);
        }

        searchInput.addEventListener('input', () => {
            updateSuggestions();
        });
        searchInput.addEventListener('focus', () => {
            updateSuggestions();
        });
        searchInput.addEventListener('keydown', (event) => {
            if (!currentSuggestions.length) return;
            if (event.key === 'ArrowDown') {
                event.preventDefault();
                const nextIndex = activeSuggestionIndex < currentSuggestions.length - 1 ? activeSuggestionIndex + 1 : 0;
                updateActiveSuggestion(nextIndex);
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                const nextIndex = activeSuggestionIndex > 0 ? activeSuggestionIndex - 1 : currentSuggestions.length - 1;
                updateActiveSuggestion(nextIndex);
            } else if (event.key === 'Enter') {
                event.preventDefault();
                openItem(currentSuggestions[activeSuggestionIndex >= 0 ? activeSuggestionIndex : 0]);
            } else if (event.key === 'Escape') {
                hideSuggestions();
            }
        });
        document.addEventListener('click', (event) => {
            if (!event.target.closest('.search-wrap')) {
                hideSuggestions();
            }
        });
        render(items);
    </script>
    <script src="./js/theme.js"></script>
</body>
</html>
