<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>noahs tutoring • games</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090909;
            --panel: rgba(19, 19, 19, 0.82);
            --grid: rgba(255, 128, 0, 0.08);
            --text: #ff9c2f;
            --muted: rgba(255, 188, 116, 0.72);
            --pill: rgba(255, 255, 255, 0.06);
            --pill-border: rgba(255, 156, 47, 0.16);
            --active: #ff8a1d;
            --active-text: #ffffff;
            --suggest: rgba(255, 138, 29, 0.94);
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-overlay: rgba(255, 128, 0, 0.48);
            --search-bg: rgba(255, 138, 29, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            cursor: url('./assets/comic.cur'), auto;
        }

        a, button, input, select { cursor: url('./assets/comic.cur'), pointer; }

        .background {
            position: fixed;
            inset: 0;
            background:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .page {
            padding: 22px 40px 56px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }

        .page h1 {
            font-size: 46px;
            font-weight: 700;
            letter-spacing: -2px;
            color: var(--text);
            text-align: left;
        }

        .topbar h1 {
            display: none;
        }

        .switcher {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px;
            border-radius: 999px;
            background: var(--pill);
            border: 1px solid var(--pill-border);
            backdrop-filter: blur(18px);
            margin: 0 auto;
        }

        .switcher a {
            text-decoration: none;
            padding: 9px 14px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.88);
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .switcher a:hover {
            transform: translateY(-1px);
        }

        .switcher a.active {
            background: var(--active);
            color: var(--active-text);
        }

        .search-wrap {
            width: min(640px, 100%);
            margin: 0 auto 26px;
            position: relative;
        }

        .search input {
            width: 100%;
            background: var(--search-bg);
            border: 1px solid rgba(255, 138, 29, 0.18);
            color: #ffd2a6;
            border-radius: 16px;
            padding: 16px 18px;
            font: inherit;
            outline: none;
        }

        .search input::placeholder {
            color: rgba(255, 210, 166, 0.58);
        }

        .search-suggestions {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 0;
            background: var(--suggest);
            border: 1px solid rgba(255, 180, 108, 0.16);
            border-radius: 18px;
            backdrop-filter: blur(24px);
            overflow: hidden;
            display: none;
            z-index: 15;
        }

        .search-suggestions.show { display: block; }

        .suggestion-button {
            width: 100%;
            border: none;
            background: transparent;
            color: white;
            text-align: left;
            padding: 12px 14px;
            font: inherit;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .suggestion-thumb {
            width: 58px;
            height: 34px;
            border-radius: 10px;
            object-fit: cover;
            flex: 0 0 auto;
            background: rgba(255, 255, 255, 0.18);
        }

        .suggestion-label {
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .suggestion-button:hover,
        .suggestion-button.active {
            background: rgba(255, 255, 255, 0.12);
        }

        .count {
            color: var(--muted);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 22px;
        }

        .card {
            position: relative;
            aspect-ratio: 16 / 9;
            border-radius: 24px;
            overflow: hidden;
            background: var(--card-bg);
            text-decoration: none;
            color: white;
            display: block;
            border: 1px solid rgba(255, 138, 29, 0.12);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.28s ease, filter 0.28s ease;
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 138, 29, 0);
            transition: background 0.28s ease;
        }

        .card-title {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 16px;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.28s ease, transform 0.28s ease;
            z-index: 1;
            text-shadow: 0 8px 24px rgba(0, 0, 0, 0.48);
        }

        .card:hover::after {
            background: var(--card-overlay);
        }

        .card:hover .card-title {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover img {
            transform: scale(1.04);
            filter: brightness(0.42);
        }

        @media (max-width: 700px) {
            .page {
                padding: 32px 20px;
            }

            .page h1 {
                font-size: 34px;
                text-align: center;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .switcher {
                flex-wrap: wrap;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>

    <main class="page">
        <div class="topbar">
            <div class="switcher" aria-label="game sections">
                <a href="./games.html">chicken</a>
                <a class="active" href="./noahs.html">noahs tutoring</a>
                <a href="./arcady.html">arcady</a>
            </div>
        </div>
        <h1>noahs tutoring</h1>
        <div class="search-wrap">
            <div class="search"><input id="searchInput" type="text" placeholder="Search noahs tutoring games..."></div>
            <div class="search-suggestions" id="searchSuggestions"></div>
        </div>
        <div class="count" id="countLabel">Loading noahs tutoring games...</div>
        <div class="grid" id="cardGrid"></div>
    </main>

    <script src="./data/noahs-games.js"></script>
    <script>
        let items = Array.isArray(window.CHICKEN_NOAHS_GAMES) ? window.CHICKEN_NOAHS_GAMES : [];
        const grid = document.getElementById('cardGrid');
        const searchInput = document.getElementById('searchInput');
        const countLabel = document.getElementById('countLabel');
        const searchSuggestions = document.getElementById('searchSuggestions');
        let activeSuggestionIndex = -1;
        let currentSuggestions = [];

        function getHref(item) {
            return `./iframe.html?url=${encodeURIComponent(item.url || '')}`;
        }

        function render(list) {
            grid.innerHTML = '';
            list.forEach((item) => {
                const link = document.createElement('a');
                link.className = 'card';
                link.href = getHref(item);

                const media = document.createElement('img');
                media.src = item.thumbnail || './noahs-source/Noahs-Calculus-Tutor-master/cuh.png';
                media.alt = item.name;

                const title = document.createElement('div');
                title.className = 'card-title';
                title.textContent = item.name;

                link.appendChild(media);
                link.appendChild(title);
                grid.appendChild(link);
            });

            countLabel.textContent = `showing ${list.length} noahs tutoring games`;
        }

        function openItem(item) {
            if (!item) return;
            window.location.href = getHref(item);
        }

        function hideSuggestions() {
            searchSuggestions.classList.remove('show');
            searchSuggestions.innerHTML = '';
            currentSuggestions = [];
            activeSuggestionIndex = -1;
        }

        function showSuggestions(list) {
            if (!list.length) {
                hideSuggestions();
                return;
            }

            currentSuggestions = list;
            activeSuggestionIndex = -1;
            searchSuggestions.innerHTML = '';

            list.forEach((item) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'suggestion-button';
                const thumb = document.createElement('img');
                thumb.className = 'suggestion-thumb';
                thumb.src = item.thumbnail || './noahs-source/Noahs-Calculus-Tutor-master/cuh.png';
                thumb.alt = '';
                const label = document.createElement('span');
                label.className = 'suggestion-label';
                label.textContent = item.name;
                button.appendChild(thumb);
                button.appendChild(label);
                button.addEventListener('mousedown', (event) => {
                    event.preventDefault();
                    openItem(item);
                });
                searchSuggestions.appendChild(button);
            });

            searchSuggestions.classList.add('show');
        }

        function updateActiveSuggestion(nextIndex) {
            const buttons = Array.from(searchSuggestions.querySelectorAll('.suggestion-button'));
            buttons.forEach((button, index) => {
                button.classList.toggle('active', index === nextIndex);
            });
            activeSuggestionIndex = nextIndex;
        }

        function updateSuggestions() {
            const value = searchInput.value.trim().toLowerCase();
            if (!value) {
                hideSuggestions();
                return;
            }

            const matches = items
                .filter((item) => item.name.toLowerCase().includes(value))
                .slice(0, 8);

            showSuggestions(matches);
        }

        searchInput.addEventListener('input', updateSuggestions);
        searchInput.addEventListener('focus', updateSuggestions);
        searchInput.addEventListener('keydown', (event) => {
            if (!currentSuggestions.length) return;

            if (event.key === 'ArrowDown') {
                event.preventDefault();
                const nextIndex = activeSuggestionIndex < currentSuggestions.length - 1 ? activeSuggestionIndex + 1 : 0;
                updateActiveSuggestion(nextIndex);
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                const nextIndex = activeSuggestionIndex > 0 ? activeSuggestionIndex - 1 : currentSuggestions.length - 1;
                updateActiveSuggestion(nextIndex);
            } else if (event.key === 'Enter') {
                event.preventDefault();
                openItem(currentSuggestions[activeSuggestionIndex >= 0 ? activeSuggestionIndex : 0]);
            } else if (event.key === 'Escape') {
                hideSuggestions();
            }
        });

        document.addEventListener('click', (event) => {
            if (!event.target.closest('.search-wrap')) {
                hideSuggestions();
            }
        });

        render(items);
    </script>
</body>
</html>
