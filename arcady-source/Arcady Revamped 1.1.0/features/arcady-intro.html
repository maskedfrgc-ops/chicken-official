<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcady Games Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Fredoka', system-ui, sans-serif;
  opacity: 1;
  transition: opacity 0.7s ease;
}

body.fade-out {
  opacity: 0;
}

@keyframes breathe {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-10px) scale(1.012); }
}
@keyframes screenOn {
  0% { opacity: 0; filter: brightness(3) blur(8px); }
  20% { opacity: 1; filter: brightness(1.6) blur(0px); }
  100% { filter: brightness(1) blur(0px); }
}
@keyframes glassReveal {
  0% { opacity: 0; transform: translateY(30px) scale(0.94); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes subtitleReveal {
  0% { opacity: 0; letter-spacing: 0.55em; }
  100% { opacity: 0.95; letter-spacing: 0.3em; }
}
@keyframes scanline {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(200%); }
}
@keyframes barSlide {
  0% { width: 0; opacity: 0; }
  100% { width: 100%; opacity: 1; }
}
@keyframes coinBlink {
  0%, 100% { opacity: 0; }
  50% { opacity: 1; }
}
@keyframes pulseRing {
  0% { box-shadow: 0 8px 32px rgba(31,38,135,0.28), inset 0 2px 12px rgba(255,255,255,0.38), 0 0 0 0 rgba(255,255,255,0.18); }
  70% { box-shadow: 0 8px 32px rgba(31,38,135,0.28), inset 0 2px 12px rgba(255,255,255,0.38), 0 0 0 18px rgba(255,255,255,0); }
  100% { box-shadow: 0 8px 32px rgba(31,38,135,0.28), inset 0 2px 12px rgba(255,255,255,0.38), 0 0 0 0 rgba(255,255,255,0); }
}

.stage {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  animation: screenOn 0.8s ease-out forwards;
}

.bg-layer {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 35%, rgba(99,102,241,0.28) 0%, transparent 55%),
    radial-gradient(ellipse at 78% 65%, rgba(168,85,247,0.22) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(56,189,248,0.10) 0%, transparent 60%),
    #06080f;
}

.stars-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.scan-beam {
  position: absolute;
  left: 0; right: 0;
  height: 80px;
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.025), transparent);
  animation: scanline 4s linear infinite;
  pointer-events: none;
}

.scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.09) 3px, rgba(0,0,0,0.09) 4px);
  pointer-events: none;
  z-index: 3;
}

.glass-card {
  position: relative;
  z-index: 10;
  background: rgba(255,255,255,0.13);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.28);
  border-radius: 28px;
  padding: 3.2rem 4rem;
  text-align: center;
  min-width: 340px;
  max-width: 560px;
  animation: glassReveal 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.5s both, breathe 9s ease-in-out 1.5s infinite, pulseRing 2.8s ease-out 1.4s infinite;
}

.glass-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(ellipse at top left, rgba(255,255,255,0.22), transparent 45%);
  pointer-events: none;
}

.bar-top {
  height: 3px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(99,102,241,0.9), rgba(168,85,247,0.9), rgba(56,189,248,0.9));
  margin-bottom: 1.6rem;
  animation: barSlide 0.55s ease-out 1s both;
  box-shadow: 0 0 12px rgba(168,85,247,0.45);
}

.logo-eyebrow {
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.65);
  margin-bottom: 0.6rem;
  animation: glassReveal 0.5s ease 1.1s both;
}

.logo-title {
  font-size: clamp(2.6rem, 6vw, 3.8rem);
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.04em;
  line-height: 1.05;
  text-shadow: 0 6px 24px rgba(99,102,241,0.55), 0 2px 8px rgba(0,0,0,0.45);
  animation: glassReveal 0.65s cubic-bezier(0.34,1.56,0.64,1) 0.85s both;
}

.logo-subtitle {
  margin-top: 0.75rem;
  font-size: 1.05rem;
  font-weight: 600;
  color: rgba(255,255,255,0.82);
  animation: subtitleReveal 0.6s ease-out 1.5s both;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

.bar-bottom {
  height: 3px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(56,189,248,0.9), rgba(168,85,247,0.9), rgba(99,102,241,0.9));
  margin-top: 1.6rem;
  animation: barSlide 0.55s ease-out 1.6s both;
  box-shadow: 0 0 12px rgba(56,189,248,0.4);
}

.insert-coin {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  animation: coinBlink 1.1s step-start 3.2s infinite;
  white-space: nowrap;
  z-index: 10;
}

.corner-tag {
  position: absolute;
  padding: 6px 14px;
  font-size: 0.75rem;
  font-weight: 700;
  color: #fff;
  border-radius: 999px;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  box-shadow: 0 4px 14px rgba(99,102,241,0.45);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  z-index: 10;
  animation: glassReveal 0.45s ease 2.0s both;
  font-family: 'Fredoka', system-ui, sans-serif;
}

.corner-tag.tl { top: 24px; left: 24px; }
.corner-tag.tr {
  top: 24px; right: 24px;
  background: linear-gradient(135deg, #f59e0b, #fbbf24);
  color: #1f2937;
  box-shadow: 0 4px 14px rgba(245,158,11,0.45);
}
</style>
</head>
<body>

<div class="stage">
  <div class="bg-layer"></div>
  <canvas class="stars-canvas" id="sc"></canvas>
  <div class="scan-beam"></div>
  <div class="scanlines"></div>

  <div class="corner-tag tl">Est. 2025</div>
  <div class="corner-tag tr">Featured</div>

  <div class="glass-card">
    <div class="bar-top"></div>
    <div class="logo-eyebrow">Welcome to</div>
    <div class="logo-title">Arcady Games</div>
    <div class="logo-subtitle">Play &bull; Explore &bull; Level Up</div>
    <div class="bar-bottom"></div>
  </div>

  <div class="insert-coin">— Insert Coin —</div>
</div>

<script>
const canvas = document.getElementById('sc');
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const ctx = canvas.getContext('2d');
const stars = Array.from({length: 110}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 1.6 + 0.2,
  phase: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.018 + 0.006
}));

(function draw(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const a = 0.12 + 0.75 * (0.5 + 0.5 * Math.sin(s.phase + t * s.speed));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,210,255,${a})`;
    ctx.fill();
  });
  requestAnimationFrame(draw);
})();

(function handleGameRedirect() {
  const params = new URLSearchParams(window.location.search);
  const gameParam = params.get('game');
  if (!gameParam) {
    return;
  }

  const destination = new URL(gameParam, window.location.href).href;
  const subtitle = document.querySelector('.logo-subtitle');
  if (subtitle) {
    subtitle.textContent = 'Getting your game ready...';
  }

  const card = document.querySelector('.glass-card');
  if (card) {
    const redirectNote = document.createElement('div');
    redirectNote.style.marginTop = '1.2rem';
    redirectNote.style.fontSize = '0.98rem';
    redirectNote.style.color = 'rgba(255,255,255,0.78)';
    redirectNote.style.lineHeight = '1.5';
    redirectNote.textContent = 'Arcady is loading your game now. Redirecting shortly...';
    card.appendChild(redirectNote);
  }

  setTimeout(function () {
    document.body.classList.add('fade-out');
    setTimeout(function () {
      window.location.href = destination;
    }, 700);
  }, 2200);
})();
</script>

</body>
</html>
