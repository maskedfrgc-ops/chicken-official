<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arcady - Vault</title>
  <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/arcady-web/arcady-web.github.io@main/favicon/checking-you-out-blue-emoji-blue.png">
  <link rel="shortcut icon" type="image/png" href="https://cdn.jsdelivr.net/gh/arcady-web/arcady-web.github.io@main/favicon/checking-you-out-blue-emoji-blue.png">
  <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/arcady-web/arcady-web.github.io@main/favicon/checking-you-out-blue-emoji-blue.png">
  <script src="../shared-favicon.js?v=1" defer></script>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../style.css">

  <style>
    /* Vault page padding to avoid nav overlap */
    #vault-page {
      padding-top: 120px;          /* ← gives space under fixed nav */
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* Lock screen styling */
    #vault-lock-screen {
      max-width: 540px;
      margin: 80px auto 0;
      padding: 40px 30px;
      background: rgba(30, 30, 60, 0.55);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      text-align: center;
    }

    #vault-code {
      width: 100%;
      padding: 22px 20px;
      font-size: 1.6rem;
      text-align: center;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      color: white;
      font-family: 'Fredoka', sans-serif;
      transition: all 0.3s ease;
    }

    #vault-code:focus {
      outline: none;
      border-color: #ffffffff;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.81);
    }

    #vault-submit {
      width: 100%;
      margin-top: 20px;
      padding: 18px;
      font-size: 1.4rem;
      font-weight: 600;
      background: linear-gradient(135deg, #ffffffff, #939393ff);
      border: none;
      color: white;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }

    #vault-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(255, 255, 255, 0.45);
    }

    #vault-error {
      color: #ff6b6b;
      font-weight: 500;
      margin-top: 20px;
      font-size: 1.2rem;
    }

    /* Unlocked screen */
    #vault-unlocked-screen {
      padding: 40px 20px;
    }

    #vault-boxes {
      margin: 0 auto;
    }

    #vault-unlocked-screen {
      padding: 40px 20px 0;
    }

    #vault-error {
      display: none;
    }

    #admin-modal {
      background: rgba(12, 16, 32, 0.72);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
    }

    #admin-modal .modal-content {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.16);
      color: #f8fbff;
    }

    #admin-modal .admin-panel-content {
      display: grid;
      gap: 1rem;
    }

    #admin-modal .admin-panel-content section {
      display: grid;
      gap: 0.85rem;
      padding: 1rem 1.1rem;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
    }

    #admin-modal .admin-panel-content label {
      color: rgba(255, 255, 255, 0.88);
      font-size: 0.95rem;
      display: block;
      margin-bottom: 0.4rem;
    }

    #admin-modal .admin-panel-content input,
    #admin-modal .admin-panel-content textarea,
    #admin-modal .admin-panel-content select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
      resize: vertical;
    }

    #admin-modal .admin-panel-content input::placeholder,
    #admin-modal .admin-panel-content textarea::placeholder,
    #admin-modal .admin-panel-content select::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    #admin-modal .admin-panel-content button {
      width: 100%;
      padding: 16px 18px;
      border-radius: 14px;
      border: none;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
    }

    #admin-modal .admin-panel-content button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
      background: rgba(255, 255, 255, 0.24);
    }

    .arcady-admin-soundboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      margin-top: 12px;
      max-height: 260px;
      overflow: auto;
      padding-right: 4px;
    }

    .arcady-admin-sound-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .arcady-admin-sound-button {
      min-height: 64px;
      text-align: left;
      overflow: hidden;
    }

    .arcady-admin-sound-button.is-active {
      background: rgba(98, 232, 255, 0.2);
      border-color: rgba(98, 232, 255, 0.48);
    }

    .arcady-admin-sound-label,
    .arcady-admin-sound-meta {
      display: block;
    }

    .arcady-admin-sound-label {
      display: -webkit-box;
      display: box;
      font-weight: 700;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }

    .arcady-admin-sound-meta {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <nav class="glass" id="nav-bar" role="navigation" aria-label="Primary">
    <div class="nav-links" role="menubar">
      <a href="../index.html" role="menuitem" aria-label="Home"><i data-lucide="home"></i></a>
      <a href="games.html" role="menuitem" aria-label="Games"><i data-lucide="gamepad-2"></i></a>
      <a href="proxys.html" role="menuitem" aria-label="Proxys"><i data-lucide="layout-grid"></i></a>
      <a href="websites.html" role="menuitem" aria-label="Websites"><i data-lucide="globe"></i></a>

      <button id="settings-btn" aria-label="Settings"><i data-lucide="settings"></i></button>

  </nav>

  <!-- Settings Panel -->
  <div id="settings-panel" class="glass">
    <label for="bg-color">Background Color:</label>
    <input type="color" id="bg-color" value="#87CEEB">
    <label for="font-color">Font Color:</label>
    <input type="color" id="font-color" value="#000000">
    <label for="font-style">Font Style:</label>
    <select id="font-style">
      <option value="'Fredoka', sans-serif">Fredoka</option>
      <option value="'Roboto', sans-serif">Roboto</option>
      <option value="'Playfair Display', serif">Playfair Display</option>
    </select>
    <label for="bg-image">Background Image:</label>
    <input type="file" id="bg-image" accept="image/*">

    <label for="tab-title">Tab Cloak Title:</label>
    <input type="text" id="tab-title" placeholder="e.g., Google Classroom">

      <option value="left">Left Side</option>

    </select>
    <button id="reset-settings">Reset All Settings</button>
  </div>

  <!-- Floating Buttons -->
  <!-- VAULT – full page -->
  <div id="vault-page">
    <!-- Lock Screen -->
    <div id="vault-lock-screen">
      <h1 style="font-size: 3.5rem; margin-bottom: 30px; color: #fff;">🔒 Arcady Vault</h1>
      <p style="font-size: 1.4rem; margin-bottom: 40px; color: #ddd;">Enter secret combination code to unlock</p>
      <input type="text" id="vault-code" placeholder="only some people have this">
      <button id="vault-submit">Unlock</button>
      <div id="vault-error">Invalid code</div>

        <button id="vault-lock-again" style="padding: 14px 40px; font-size: 1.2rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 12px; cursor: pointer;">Lock Vault</button>
      </div>
      
      <div class="gallery" id="vault-boxes"></div>
    </div>
  </div>

  <!-- Game Modal -->
  <div id="iframe-modal" class="modal glass" style="display: none;">
    <div class="modal-content">
      <button class="modal-close" title="Close" aria-label="Close"><i data-lucide="x" aria-hidden="true"></i></button>
      <div class="iframe-wrapper">
        <iframe loading="lazy" id="modal-iframe" src="about:blank" frameborder="0"></iframe>
        <video id="modal-video" controls playsinline style="display:none; position:absolute; inset:0; width:100%; height:100%; background:#000;"></video>
      </div>
      <div class="modal-controls">
        <button id="btn-refresh"><i data-lucide="rotate-ccw" aria-hidden="true"></i> Refresh</button>
        <button id="btn-fullscreen"><i data-lucide="maximize-2" aria-hidden="true"></i> Full Screen</button>
        <button id="btn-new-tab"><i data-lucide="external-link" aria-hidden="true"></i> Open in new tab</button>
      </div>
    </div>
  </div>

  <div id="admin-modal" class="modal glass" style="display: none;">
    <div class="modal-content" style="max-height: 80vh; overflow-y: auto;">
      <button class="modal-close" title="Close" aria-label="Close"><i data-lucide="x" aria-hidden="true"></i></button>
      <h2 style="margin-bottom: 18px; color: #fff;">Vault Admin Panel</h2>
      <div class="admin-panel-content">
        <section>
          <label for="vault-admin-announcement">Announcement</label>
          <textarea id="vault-admin-announcement" rows="4" placeholder="Enter announcement text"></textarea>
          <button id="vault-admin-send-announcement">Send announcement</button>
        </section>
        <section>
          <label for="vault-admin-poll-question">Poll question</label>
          <input id="vault-admin-poll-question" type="text" placeholder="Poll question">
          <label for="vault-admin-poll-options">Options (one per line)</label>
          <textarea id="vault-admin-poll-options" rows="4" placeholder="Option 1\nOption 2"></textarea>
          <button id="vault-admin-send-poll">Create poll</button>
        </section>
        <section>
          <div class="arcady-admin-title">Live Soundboard</div>
          <div id="vault-admin-soundboard" class="arcady-admin-soundboard"></div>
        </section>
        <div id="vault-admin-status" style="margin-top: 0.5rem; min-height: 24px; color: #c7eaff;"></div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    lucide.createIcons();

    // ── SETTINGS CODE ── (keep your original settings listeners here)
    const settingsBtn = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const body = document.body;
    const navBar = document.getElementById('nav-bar');

    settingsBtn.addEventListener('click', () => {
      settingsPanel.style.display = settingsPanel.style.display === 'flex' ? 'none' : 'flex';
    });

    // Load saved settings
    window.addEventListener('load', () => {
      if (localStorage.getItem('bgColor')) body.style.backgroundColor = localStorage.getItem('bgColor');
      if (localStorage.getItem('fontColor')) body.style.color = localStorage.getItem('fontColor');
      if (localStorage.getItem('fontStyle')) body.style.fontFamily = localStorage.getItem('fontStyle');
      if (localStorage.getItem('bgImage')) {
        body.style.backgroundImage = `url(${localStorage.getItem('bgImage')})`;
        body.style.backgroundSize = 'cover';
        body.style.backgroundPosition = 'center';
      }
      if (localStorage.getItem('fontGlow') === 'true') {
        body.classList.add('font-glow');
        document.getElementById('font-glow').checked = true;
      }
      if (localStorage.getItem('navPosition')) {
        applyNavPosition(localStorage.getItem('navPosition'));
        document.getElementById('nav-position').value = localStorage.getItem('navPosition');
      }
      if (localStorage.getItem('tabTitle')) document.title = localStorage.getItem('tabTitle');
      if (localStorage.getItem('tabFavicon')) {
        let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
        link.rel = 'icon';
        link.href = localStorage.getItem('tabFavicon');
        document.head.appendChild(link);
      }
    });

    // ... keep all your other settings event listeners (bg-color, font-color, font-style, bg-image, cloak, glow, nav-position, reset) ...

    // ── GAME MODAL ──
    const modal = document.getElementById('iframe-modal');
    const iframe = document.getElementById('modal-iframe');
    const modalVideo = document.getElementById('modal-video');
    const modalClose = document.querySelector('#iframe-modal .modal-close');
    let currentUrl = '';
    let currentMediaType = 'iframe';

    function closeModal() {
      modal.style.display = 'none';
      iframe.src = 'about:blank';
      iframe.style.display = 'block';
      modalVideo.pause();
      modalVideo.removeAttribute('src');
      modalVideo.load();
      modalVideo.style.display = 'none';
      document.body.style.overflow = '';
    }

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    document.getElementById('btn-refresh').addEventListener('click', () => {
      if (!currentUrl) return;
      if (currentMediaType === 'video') {
        modalVideo.src = currentUrl;
        modalVideo.play().catch(() => {});
        return;
      }
      iframe.src = currentUrl;
    });
    document.getElementById('btn-new-tab').addEventListener('click', () => { if (currentUrl) window.open(currentUrl, '_blank'); closeModal(); });
    document.getElementById('btn-fullscreen').addEventListener('click', () => {
      const activeElement = currentMediaType === 'video' ? modalVideo : iframe;
      if (activeElement.requestFullscreen) activeElement.requestFullscreen();
      else if (activeElement.webkitRequestFullscreen) activeElement.webkitRequestFullscreen();
      else if (activeElement.msRequestFullscreen) activeElement.msRequestFullscreen();
    });

    const openGame = (url) => {
      if (!url || url === '#' || url.startsWith('javascript:')) return;
      currentMediaType = 'iframe';
      currentUrl = url;
      modalVideo.pause();
      modalVideo.style.display = 'none';
      iframe.style.display = 'block';
      iframe.src = url;
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    };

    const openVideo = (url) => {
      if (!url || url === '#' || url.startsWith('javascript:')) return;
      currentMediaType = 'video';
      currentUrl = url;
      iframe.src = 'about:blank';
      iframe.style.display = 'none';
      modalVideo.style.display = 'block';
      modalVideo.src = url;
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
      modalVideo.play().catch(() => {});
    };

    const openVaultItem = (box) => {
      if (!box) return;
      if (box.type === 'admin') {
        openAdminModal();
        return;
      }
      if (!box.url) return;
      if (box.type === 'video' || /\.(mp4|webm|ogg)(?:$|\?)/i.test(box.url)) {
        openVideo(box.url);
        return;
      }
      openGame(box.url);
    };

    const adminModal = document.getElementById('admin-modal');
    const adminModalClose = document.querySelector('#admin-modal .modal-close');
    const adminStatus = document.getElementById('vault-admin-status');
    const adminAnnouncementInput = document.getElementById('vault-admin-announcement');
    const adminPollQuestionInput = document.getElementById('vault-admin-poll-question');
    const adminPollOptionsInput = document.getElementById('vault-admin-poll-options');

    function setAdminStatus(message, isError) {
      adminStatus.textContent = message;
      adminStatus.style.color = isError ? '#ff6b6b' : '#afff97';
    }

    function openAdminModal() {
      if (window.ArcadyAdminApi && typeof window.ArcadyAdminApi.unlockAdminViaVault === 'function') {
        window.ArcadyAdminApi.unlockAdminViaVault();
      }
      // Render soundboard
      const soundboardContainer = document.getElementById('vault-admin-soundboard');
      if (soundboardContainer && window.ArcadyAdminApi && typeof window.ArcadyAdminApi.renderSoundboard === 'function') {
        soundboardContainer.innerHTML = '';
        window.ArcadyAdminApi.renderSoundboard(soundboardContainer);
      }
      adminModal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeAdminModal() {
      adminModal.style.display = 'none';
      document.body.style.overflow = '';
    }

    adminModalClose.addEventListener('click', closeAdminModal);
    adminModal.addEventListener('click', e => { if (e.target === adminModal) closeAdminModal(); });

    document.getElementById('vault-admin-send-announcement').addEventListener('click', async () => {
      const message = adminAnnouncementInput.value.trim();
      if (!message) {
        setAdminStatus('Please enter an announcement message.', true);
        return;
      }
      if (!window.ArcadyAdminApi || typeof window.ArcadyAdminApi.sendAnnouncement !== 'function') {
        setAdminStatus('Admin loader not ready yet.', true);
        return;
      }
      try {
        await window.ArcadyAdminApi.sendAnnouncement(message, '', 'bottom');
        setAdminStatus('Announcement sent.');
        adminAnnouncementInput.value = '';
      } catch (err) {
        console.error(err);
        setAdminStatus('Failed to send announcement.', true);
      }
    });

    document.getElementById('vault-admin-send-poll').addEventListener('click', async () => {
      const question = adminPollQuestionInput.value.trim();
      const options = adminPollOptionsInput.value
        .split('\n')
        .map(item => item.trim())
        .filter(Boolean);
      if (!question || options.length < 2) {
        setAdminStatus('Enter a question and at least two options.', true);
        return;
      }
      if (!window.ArcadyAdminApi || typeof window.ArcadyAdminApi.sendPoll !== 'function') {
        setAdminStatus('Admin loader not ready yet.', true);
        return;
      }
      try {
        await window.ArcadyAdminApi.sendPoll(question, options);
        setAdminStatus('Poll created.');
        adminPollQuestionInput.value = '';
        adminPollOptionsInput.value = '';
      } catch (err) {
        console.error(err);
        setAdminStatus('Failed to create poll.', true);
      }
    });

    // ── VAULT LOGIC WITH IMAGES ──
    const vaultLockScreen = document.getElementById('vault-lock-screen');
    const vaultUnlockedScreen = document.getElementById('vault-unlocked-screen');
    const vaultCodeInput = document.getElementById('vault-code');
    const vaultSubmit = document.getElementById('vault-submit');
    const vaultError = document.getElementById('vault-error');
    const vaultNameEl = document.getElementById('vault-name');
    const vaultBoxes = document.getElementById('vault-boxes');
    const vaultLockAgain = document.getElementById('vault-lock-again');

    const formatFightVideoTitle = (file) => {
      return file
        .split('/')
        .pop()
        .replace(/\.mp4$/i, '')
        .replace(/^\d{4}-\d{2}-\d{2}_/, '')
        .replace(/_[0-9]+$/, '')
        .replace(/_+/g, ' ')
        .trim() || 'Fight Clip';
    };

    const fightVaultFiles = [
      "../features/fights/2026-01-29_Clip_Station__2015899798377734627.mp4",
      "../features/fights/2026-01-29_Clip_Station__2016188387992940735.mp4",
      "../features/fights/2026-01-29_GoldBellClips_2016295153518948607.mp4",
      "../features/fights/2026-01-29_best_clips___2016199523597471863.mp4",
      "../features/fights/2026-01-29_fightsonlyy_2015877406721245331.mp4",
      "../features/fights/2026-01-29_fightsonlyy_2016224638263496997.mp4",
      "../features/fights/2026-01-29_ko_fights___2016287603952427234.mp4",
      "../features/fights/2026-01-29_ko_fights___2016619792791458164.mp4",
      "../features/fights/2026-02-21_Fights_Only_2022180480712593536.mp4",
      "../features/fights/2026-02-21_Fights_bro_2022083041485525476.mp4",
      "../features/fights/2026-02-21_Fights_bro_2025005046769856951.mp4",
      "../features/fights/2026-02-21_PicturesFoIder_1891029837269155921.mp4",
      "../features/fights/2026-02-21_PplRegretting_2022637794062143869.mp4",
      "../features/fights/2026-02-21_RANDOMFIGHTZZ_1695480902220939597.mp4",
      "../features/fights/2026-02-21_ko_fights_2023787019311464562.mp4",
      "../features/fights/2026-02-21_ko_fights_2024229937876701380.mp4",
      "../features/fights/2026-02-21_thefightsclub_2023772348634321042.mp4"
    ];

    const vaultPlaceholderImage = "../download.png";

    const vaultData = {
      "Mystery Bang": {
        name: "WOAHHH KEEP THIS A SECRET",
        boxes: [
          { 
            title: "Mystery Bang........", 
            url: "https://cdn.jsdelivr.net/gh/arcady-web/arcady-web.github.io@main/features/vault/badstuff/Mystery Bang.mp4",
            image: "https://rule34.porn/media/2024/05/Mystery-Bang.webp"
          },
            
          {

    const vaultDataLookup = Object.fromEntries(
      Object.entries(vaultData).map(([key, value]) => [key.toLowerCase(), value])
    );

    function unlockVault() {
      const code = vaultCodeInput.value.trim().toLowerCase();
      const data = vaultDataLookup[code];

      if (data) {
        vaultLockScreen.style.display = 'none';
        vaultUnlockedScreen.style.display = 'block';
        vaultNameEl.textContent = data.name;

        vaultBoxes.innerHTML = '';
        data.boxes.forEach(box => {
          const card = document.createElement('a');
          card.className = 'card';
          const imageUrl = box.image || vaultPlaceholderImage;
          card.innerHTML = `
            <img src="${imageUrl}" alt="${box.title}">
            <div class="title">${box.title}</div>
          `;
          card.addEventListener('click', e => {
            e.preventDefault();
            openVaultItem(box);
          });
          vaultBoxes.appendChild(card);
        });
      } else {
        vaultError.style.display = 'block';
        setTimeout(() => vaultError.style.display = 'none', 2500);
      }
    }

    function lockVault() {
      vaultUnlockedScreen.style.display = 'none';
      vaultLockScreen.style.display = 'block';
      vaultCodeInput.value = '';
      vaultError.style.display = 'none';
    }

    vaultSubmit.addEventListener('click', unlockVault);
    vaultCodeInput.addEventListener('keypress', e => { if (e.key === 'Enter') unlockVault(); });
    vaultLockAgain.addEventListener('click', lockVault);

    lucide.createIcons();
  </script>
