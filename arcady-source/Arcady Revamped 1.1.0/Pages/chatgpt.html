<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arcady - Bot</title>
  <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/arcady-web/arcady-web.github.io@main/favicon/checking-you-out-blue-emoji-blue.png">
  <link rel="shortcut icon" type="image/png" href="https://cdn.jsdelivr.net/gh/arcady-web/arcady-web.github.io@main/favicon/checking-you-out-blue-emoji-blue.png">
  <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/arcady-web/arcady-web.github.io@main/favicon/checking-you-out-blue-emoji-blue.png">
  <script src="../shared-favicon.js?v=1" defer></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../style.css">
  <style>
    /* Ensure iframe page fills screen without scrolling */
    html, body { height: 100%; }
    #chatgpt-iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 1; }
  </style>
</head>
<body>
  <!--Navigation Bar (icon-only Lucide dock) -->
  <nav class="glass" id="nav-bar" role="navigation" aria-label="Primary">
    <div class="nav-links" role="menubar">
      <a href="../index.html" role="menuitem" aria-label="Home"><i data-lucide="home"></i></a>
      <a href="games.html" role="menuitem" aria-label="Games"><i data-lucide="gamepad-2"></i></a>
      <a href="proxys.html" role="menuitem" aria-label="Proxys"><i data-lucide="layout-grid"></i></a>
      <a href="websites.html" role="menuitem" aria-label="Websites"><i data-lucide="globe"></i></a>
      <a href="chat.html" role="menuitem" aria-label="Chat"><i data-lucide="message-circle"></i></a>
      <a href="chatgpt.html" role="menuitem" aria-label="AI"><i data-lucide="brain"></i></a>
      <button id="settings-btn" aria-label="Settings"><i data-lucide="settings"></i></button>
    </div>
  </nav>

  <!-- Settings Panel (kept intact) -->
  <div id="settings-panel" class="glass">
    <label for="bg-color">Background Color:</label>
    <input type="color" id="bg-color" value="#87CEEB">

    <label for="font-color">Font Color:</label>
    <input type="color" id="font-color" value="#000000">

    <label for="font-style">Font Style:</label>
    <select id="font-style">
      <option value="'Fredoka', sans-serif">Fredoka</option>
      <option value="'Roboto', sans-serif">Roboto</option>
      <option value="'Playfair Display', serif">Playfair Display</option>
    </select>

    <label for="bg-image">Background Image:</label>
    <input type="file" id="bg-image" accept="image/*">

    <button id="open-about-blank">Open in about:blank</button>

    <label for="tab-title">Tab Cloak Title:</label>
    <input type="text" id="tab-title" placeholder="e.g., Google Classroom">

    <label for="tab-favicon">Tab Cloak Favicon URL:</label>
    <input type="text" id="tab-favicon" placeholder="https://.../favicon.ico">
    <button id="apply-cloak">Apply Tab Cloak</button>

    <label>Font Glow:</label>
    <input type="checkbox" id="font-glow">

    <label for="nav-position">Nav Position:</label>
    <select id="nav-position">
      <option value="top-center">Top Center</option>
      <option value="bottom-center">Bottom Center</option>
      <option value="left">Left Side</option>
      <option value="right">Right Side</option>
    </select>

    <button id="reset-settings">Reset All Settings</button>
  </div>

  <!-- Full-screen iframe content -->
  <iframe id="chatgpt-iframe" loading="lazy" src="https://toolbaz.com" allowfullscreen allow="fullscreen"></iframe>

  <!-- Lucide + settings JS -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>

  <script>
    // Settings & nav behavior (kept from original)
    (function () {
      const settingsBtn = document.getElementById('settings-btn');
      const settingsPanel = document.getElementById('settings-panel');
      const body = document.body;
      const navBar = document.getElementById('nav-bar');

      settingsBtn.addEventListener('click', function () {
        settingsPanel.style.display = settingsPanel.style.display === 'flex' ? 'none' : 'flex';
      });

      window.addEventListener('load', function () {
        if (localStorage.getItem('bgColor')) body.style.backgroundColor = localStorage.getItem('bgColor');
        if (localStorage.getItem('fontColor')) body.style.color = localStorage.getItem('fontColor');
        if (localStorage.getItem('fontStyle')) body.style.fontFamily = localStorage.getItem('fontStyle');
        if (localStorage.getItem('bgImage')) {
          body.style.backgroundImage = 'url(' + localStorage.getItem('bgImage') + ')';
          body.style.backgroundSize = 'cover';
          body.style.backgroundPosition = 'center';
        }
        if (localStorage.getItem('fontGlow') === 'true') {
          body.classList.add('font-glow');
          document.getElementById('font-glow').checked = true;
        }
        if (localStorage.getItem('navPosition')) {
          applyNavPosition(localStorage.getItem('navPosition'));
          document.getElementById('nav-position').value = localStorage.getItem('navPosition');
        }
        if (localStorage.getItem('tabTitle')) document.title = localStorage.getItem('tabTitle');
        if (localStorage.getItem('tabFavicon')) {
          let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
          link.rel = 'icon';
          link.href = localStorage.getItem('tabFavicon');
          document.head.appendChild(link);
        }
      });

      document.getElementById('bg-color').addEventListener('input', function (event) {
        body.style.backgroundColor = event.target.value;
        localStorage.setItem('bgColor', event.target.value);
      });

      document.getElementById('font-color').addEventListener('input', function (event) {
        body.style.color = event.target.value;
        localStorage.setItem('fontColor', event.target.value);
      });

      document.getElementById('font-style').addEventListener('change', function (event) {
        body.style.fontFamily = event.target.value;
        localStorage.setItem('fontStyle', event.target.value);
      });

      document.getElementById('bg-image').addEventListener('change', function (event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (loadEvent) {
          const url = loadEvent.target.result;
          body.style.backgroundImage = 'url(' + url + ')';
          body.style.backgroundSize = 'cover';
          body.style.backgroundPosition = 'center';
          localStorage.setItem('bgImage', url);
        };
        reader.readAsDataURL(file);
      });

      document.getElementById('open-about-blank').addEventListener('click', function () {
        const win = window.open('about:blank', '_blank');
        const iframe = win.document.createElement('iframe');
        iframe.src = location.href;
        iframe.style.cssText = 'position:fixed;inset:0;border:none;width:100%;height:100%;';
        win.document.body.appendChild(iframe);
      });

      document.getElementById('apply-cloak').addEventListener('click', function () {
        const title = document.getElementById('tab-title').value.trim();
        const favicon = document.getElementById('tab-favicon').value.trim();
        if (title) {
          document.title = title;
          localStorage.setItem('tabTitle', title);
        }
        if (favicon) {
          let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
          link.rel = 'icon';
          link.href = favicon;
          document.head.appendChild(link);
          localStorage.setItem('tabFavicon', favicon);
        }
      });

      document.getElementById('font-glow').addEventListener('change', function (event) {
        body.classList.toggle('font-glow', event.target.checked);
        localStorage.setItem('fontGlow', event.target.checked);
      });

      document.getElementById('nav-position').addEventListener('change', function (event) {
        const pos = event.target.value;
        applyNavPosition(pos);
        localStorage.setItem('navPosition', pos);
      });

      document.getElementById('reset-settings').addEventListener('click', function () {
        if (!confirm('Reset all settings to default?')) return;

        localStorage.clear();
        body.style.backgroundColor = '#87CEEB';
        body.style.backgroundImage = '';
        body.style.color = '#000000';
        body.style.fontFamily = "'Fredoka', sans-serif";
        body.classList.remove('font-glow');

        document.getElementById('bg-color').value = '#87CEEB';
        document.getElementById('font-color').value = '#000000';
        document.getElementById('font-style').value = "'Fredoka', sans-serif";
        document.getElementById('font-glow').checked = false;
        document.getElementById('nav-position').value = 'top-center';
        document.getElementById('tab-title').value = '';
        document.getElementById('tab-favicon').value = '';

        document.title = 'Arcady - Bot';
        const link = document.querySelector("link[rel*='icon']");
        if (link) link.remove();

        applyNavPosition('top-center');
        settingsPanel.style.display = 'none';
      });

      function applyNavPosition(pos) {
        navBar.style.position = 'fixed';
        navBar.style.transform = '';
        navBar.style.flexDirection = 'row';
        navBar.style.minWidth = '92vw';
        navBar.style.width = 'auto';
        navBar.style.height = 'auto';
        navBar.style.minHeight = '';
        navBar.style.borderRadius = '24px';

        if (pos === 'top-center') {
          navBar.style.top = '20px';
          navBar.style.bottom = '';
          navBar.style.left = '50%';
          navBar.style.right = '';
          navBar.style.transform = 'translateX(-50%)';
        } else if (pos === 'bottom-center') {
          navBar.style.top = '';
          navBar.style.bottom = '20px';
          navBar.style.left = '50%';
          navBar.style.right = '';
          navBar.style.transform = 'translateX(-50%)';
        } else if (pos === 'left') {
          navBar.style.top = '50%';
          navBar.style.bottom = '';
          navBar.style.left = '20px';
          navBar.style.right = '';
          navBar.style.transform = 'translateY(-50%)';
          navBar.style.flexDirection = 'column';
          navBar.style.minWidth = 'auto';
          navBar.style.minHeight = '50vh';
        } else if (pos === 'right') {
          navBar.style.top = '50%';
          navBar.style.bottom = '';
          navBar.style.left = '';
          navBar.style.right = '20px';
          navBar.style.transform = 'translateY(-50%)';
          navBar.style.flexDirection = 'column';
          navBar.style.minWidth = 'auto';
          navBar.style.minHeight = '50vh';
        }
      }
    })();
  </script>

  <script>
    (function () {
      function load(src) {
        return new Promise(function (resolve, reject) {
          const script = document.createElement('script');
          script.src = src;
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }

      load('../features/admin/firebase-config.js?v=14').then(function () {
        return load('../features/admin/site-admin.js?v=14');
      }).catch(function (error) {
        console.error('Arcady admin loader failed:', error);
      });
    })();
  </script>

  <script src="../features/shared-more-windows.js?v=1"></script>
  <script src="../features/broadcast-more-notify.js?v=1"></script>
</body>
</html>
